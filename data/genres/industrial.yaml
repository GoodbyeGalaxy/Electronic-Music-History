  description: 'Electronic Body Music (EBM) entstand Anfang der 1980er in Westeuropa,
    vor allem in Belgien. Tanzbare Hybride aus Industrial-Aggression und Synthesizer-Pop:
    sequenzierte Basslinien, programmierte Rhythmen und kommandierende Vocals mit konfrontativen
    Themen. Front 242, Nitzer Ebb und DAF praegten den Sound; den Begriff EBM praegte
    Front 242 selbst.

