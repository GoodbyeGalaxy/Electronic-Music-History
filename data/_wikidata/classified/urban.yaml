- description: Funkot (an abbreviation from Funky Kota) is an electronic dance music
    genre from Indonesia that emerged in the 1990s. Funkot is a mix of House music
    with a tempo of 160 to 220 bpm (beats per minute). Many other names exist for
    this genre, namely "Hardfunk", "House Kota", "Indonesian House", and "Indonesian
    Hardcore".
