- description: The Warehouse Project is a series of club nights organised in Greater
    Manchester, England, since 2006. Unlike most other clubs, it has a limited seasonal
    approach rather than running all year. Each year's season runs from September
    through to New Year's Day, plus occasional one off dates such as Bank Holiday
    weekends. This period corresponds with the busiest time of the year and the student
    calendar.
  enwiki_slug: The_Warehouse_Project
