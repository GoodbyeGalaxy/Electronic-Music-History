- description: Afro house (also known as Afro-house or Afrohouse) is a sub-genre of
    house music mainly developed in South Africa. The genre emerged in the 1990s.
    This musical style fuses elements of traditional house with South African rhythms
    and sounds, incorporating instruments such as the saxophone, piano and synthesizers,
    as well as vocals in various African languages.
  enwiki_slug: Afro_house
  name: Afro house
  parent_qids:
  - Q20502
  qid: Q388100
  year_start: 2005
- description: Afro tech (also Afro-tech or AfroTech) is a sub-genre of afro house
    which originates and is predominantly made in South Africa. It emerged in the
    2010s. South African DJs and music producers who popularized the genre include
    Black Coffee, Culoe De Song, Bekzin Terris, Euphonik ( DJ Themba), Punk Mbedzi,
    DJ Tira, Zakes Bantwini, Shimza and Da Capo.
  enwiki_slug: Afro_tech
  name: Afro tech
