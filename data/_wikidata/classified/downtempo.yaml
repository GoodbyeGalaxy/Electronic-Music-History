- description: 'Downtempo (or downbeat) is a broad label for electronic music that
    features an atmospheric sound and slower beats than would typically be found in
    dance music (downtempo tracks are usually around 90 BPM). Closely related to ambient
    music but with greater emphasis on rhythm, the style may be played in relaxation
    clubs or as "warm-up or cool-down" music during a DJ set. Examples of downtempo
    subgenres include trip hop, ambient house, chillwave, psybient and lofi hip hop.

