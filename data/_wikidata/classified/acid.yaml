- description: 'Acid is an umbrella term for styles of electronic music—such as acid
    house, acid trance, acid techno, and acid breaks—which employ the "squelching"
    sounds of the Roland TB-303 synthesizer. The acid sound became popular in the
    mid-1980s in connection with the Chicago house scene, including artists such as
    Phuture and labels like Trax Records.

    The term acid specifically refers to the harsh squelching sound of the Roland
    303. The acid sound is achieved by turning up the filter resonance and turning'
