- description: 'Paradise Garage, also known as "the Garage" or the "Gay-rage", was
    a New York City discotheque notable in the history of dance and pop music, as
    well as LGBT and nightclub cultures.  The 10,000 square feet (930 m2) club was
    founded by sole proprietor Michael Brody, and occupied a building formerly located
    at 84 King Street in the SoHo neighborhood. It operated from 1977 to 1987 and
    featured resident DJ Larry Levan.

    The Garage is credited with influencing the development of modern nightclubs,
    and'
