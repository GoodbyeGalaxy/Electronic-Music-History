- description: Industrial techno is a subgenre of techno and industrial dance music
    that originated in the 1990s. Characteristically, it incorporates influences from
    the bleak, noisy sound and aesthetics of early industrial music acts, particularly
    Cabaret Voltaire and Throbbing Gristle. American industrial music label Wax Trax!
    also had a profound influence over the genre's development.
