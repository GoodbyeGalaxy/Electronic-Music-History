- description: 'Discomagic Records (1979–1997), owned by Severo Lombardoni was the
    largest dance record label in Italy. It spawned a large number of sub-labels from
    the early 1980s to the early 1990s and it set the standards for an entire genre
    of music ranging from Italo disco to Italo house.

    With S.r.I as its initial legal form, the company changed its legal form to S.p.A.
