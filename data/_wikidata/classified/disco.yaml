- description: 'The Crisco Disco was a New York City discotheque notable in the history
    of modern dance, LGBT and nightclub cultures. The venue was an important gay club
    located in the Chelsea neighborhood of Manhattan at 15th Street and 10th Avenue.

    It operated from the 1970s to the 1980s during the disco era, and it has been
    compared in importance to other NYC clubs such as Paradise Garage. In 2015, Michael
    Musto listed Crisco Disco as one of the eight "...edgiest [NYC venues] that shall
    never be recaptured."'
