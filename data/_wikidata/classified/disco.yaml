- description: 'Italo disco or Italodisco (variously capitalized, and sometimes hyphenated
    as Italo-disco) is a music genre which originated in Italy in the early 1980s.
    Italo disco evolved from the then-current post-disco dance music and synth-pop,
    both domestic and foreign (hi-NRG, Euro disco) and developed into a diverse genre.
    The genre employs electronic drums, drum machines, synthesizers, and occasionally
    vocoders. It is usually sung in English, and to a lesser extent in Italian and
    Spanish.

