- description: Crunkcore (also known as crunk punk, screamo crunk, and scrunk) is
    a musical fusion microgenre characterized by the combination of musical elements
    from crunk, post-hardcore (particularly pop screamo), heavy metal, pop, electronic
    and dance music. The genre often features screamed vocals, hip hop beats, and
    sexually provocative lyrics. The genre developed from members of the scene subculture
