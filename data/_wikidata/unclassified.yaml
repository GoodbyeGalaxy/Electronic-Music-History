- description: 'Le Palace is a Paris theatre located at 8, Rue du Faubourg-Montmartre
    in the 9th arrondissement. It is best known for its years as a nightclub.

    Created by impresario Fabrice Emaer (1935–1983) in 1978, intellectuals, actors,
    designers, artists, models and American and European jetsetters patronized the
    club for its flamboyant DJ Guy Cuevas, extravagant theme parties and performances,
    and Emaer''s rule-breaking mix of club-goers that threw together rich and poor,
    gay and straight, black and white.'
