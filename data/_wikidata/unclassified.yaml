- description: "Kosmische Musik (\"cosmic music\") is a music genre of 1970s German\
    \ electronic music which makes extensive use of synthesizers and incorporates\
    \ themes related to space or otherworldliness; it is also used as a German analogue\
    \ to the English term \"space rock\". The term was coined in 1971 by Edgar Froese\
    \ and later used by record producer Rolf-Ulrich Kaiser as a marketing term for\
